<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f7a52"/>
      <stop offset="100%" stop-color="#0a1f15"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="380" cy="140" r="50" fill="url(#gold)" opacity="0.9"/>
  <!-- Tree -->
  <rect x="120" y="290" width="22" height="80" fill="#5a3a1f"/>
  <circle cx="131" cy="270" r="62" fill="#155f3f"/>
  <circle cx="105" cy="240" r="32" fill="#1f7a52"/>
  <circle cx="160" cy="245" r="34" fill="#1f7a52"/>
  <!-- Deer silhouette -->
  <g transform="translate(280, 320)">
    <ellipse cx="0" cy="0" rx="68" ry="32" fill="#2a1a0a"/>
    <ellipse cx="55" cy="-8" rx="22" ry="18" fill="#2a1a0a"/>
    <path d="M62 -22 L75 -52 L66 -50 M62 -22 L80 -36 M70 -16 L96 -28" stroke="#2a1a0a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="-44" y="22" width="8" height="28" fill="#2a1a0a"/>
    <rect x="36" y="22" width="8" height="28" fill="#2a1a0a"/>
    <rect x="-22" y="22" width="8" height="28" fill="#2a1a0a"/>
    <rect x="14" y="22" width="8" height="28" fill="#2a1a0a"/>
  </g>
  <!-- Crosshair -->
  <g transform="translate(256, 256)" stroke="#f4c430" stroke-width="6" fill="none" opacity="0.85">
    <circle r="60"/>
    <line x1="-72" y1="0" x2="-30" y2="0"/>
    <line x1="30" y1="0" x2="72" y2="0"/>
    <line x1="0" y1="-72" x2="0" y2="-30"/>
    <line x1="0" y1="30" x2="0" y2="72"/>
  </g>
  <!-- Title strip -->
  <rect x="56" y="420" width="400" height="56" rx="14" fill="#0a1f15" stroke="#f4c430" stroke-width="3"/>
  <text x="256" y="458" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#f4c430" letter-spacing="3">JUNGLE HUNTER</text>
</svg>
